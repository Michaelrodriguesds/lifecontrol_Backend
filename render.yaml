services:
  - type: web
    name: lifecontrol-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DATABASE_NAME
        value: lifecontrol
      - key: SECRET_KEY
        sync: false
      - key: DEV_MODE
        value: false
      - key: ALLOWED_ORIGINS
        sync: false
